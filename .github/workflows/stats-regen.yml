name: stats-regen
# Recompute analysis outputs from run artifacts through the read-only results
# API and diff against committed outputs (L2). Analysis consumes enumerated run
# IDs only (no globs — hostile-audit A7).
on:
  push:
  pull_request:

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install stats stack
        run: pip install "pyyaml==6.0.2" "jsonschema==4.23.0" "numpy==2.1.3" "pandas==2.2.3" "pyarrow==17.0.0" "scipy==1.14.1" "statsmodels==0.14.4"
      - name: Recompute all analysis outputs and diff manifests
        run: |
          python -m analysis.run --all --check
        env:
          PYTHONPATH: src
