id: eval_extractor
schema_version: v1
kind: extraction
# Instrument version (stamped as extractor_version). 1.1.0 = Pass B rule-engine
# audit: signed-number direction parsing (fixes B0 DSA 0.636->~1.0) + longest-
# match residual-span guard. 1.2.0 = stem-matched direction words: participle
# phrasings ("has a decreasing effect") no longer fall through to the default-
# POSITIVE branch (blind audit 2026-07-11: mis-signed 63/150 B4@8B instances,
# the entire "b4 DSA regression"). 1.3.0 = sentence-bounded claim window (was
# fixed 60 chars; recovers tail-position cues — "Feature: <long value clause>,
# which decreases the attack score", 73/176 Mistral-B4 mismatches) + nearest
# direction cue wins within the window; claim-level direction_evidence stamp.
# 1.4.0 = paraphrase recovery: hash-pinned alias table + _/-/case-normalised
# matching (Qwen3-32B smoke: 38/60 B3 instances scored 0 because "the maximum
# forward packet length" never exact-matched "Fwd Packet Length Max").
# Prompt asset unchanged (1.0.0).
version: 1.4.0
# FIREWALL SIDE B. model.model_family must be disjoint from every generator LLM
# family {mistral, llama3, qwen, frontier} AND the VtE verifier family {phi}.
# gemma-4-26B-A4B-it: latest Gemma generation (MoE, 25.2B total / 3.8B active),
# Apache-2.0, ungated; ~14 GB in nf4 -> 2x T4 with FAITHFULIDS_DEVICE_MAP=auto.
# NOTE env: Gemma 4 requires transformers v5.x; the bnb-4bit load regression
# (huggingface/transformers#43032, hit by the Qwen3-32B pilot run on Kaggle's
# transformers 5.0.0) is fixed in later v5 — LLM-assisted extraction sessions
# need a recent v5 (`pip install -U transformers`), unlike generator sessions
# currently pinned <5. Smoke-test on Kaggle before relying on it.
model:
  model_family: gemma
  provider: local_open_weights
  quantisation: 4bit
  weights:
    hf_repo: google/gemma-4-26B-A4B-it
    revision: 5305c1e72ea29c01f31a81230d52b375ba88b409
    sha256: null
rule_assisted: true
