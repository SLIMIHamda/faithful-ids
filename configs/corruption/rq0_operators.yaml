id: rq0_operators
schema_version: v1
kind: corruption
# RQ0 meta-validation: inject KNOWN corruptions into faithful-by-construction B1
# outputs, with ground-truth labels, so metric sensitivity/specificity can be
# calibrated. A metric is admissible only after passing this battery.
#
# detector_metrics (EXP-G-002 matched-pairs criterion): the metric(s) DESIGNATED
# to detect each operator — a corruption is structurally invisible to some
# metrics (DSA cannot see a rank inversion), so admissibility is per matched
# pair: a designated metric must reach sens >= rq0_sensitivity on ITS operators
# and spec >= rq0_specificity on faithful items, at the recorded ROC operating
# point. An empty list is a DOCUMENTED BLIND SPOT (reported, non-blocking).
#
# magnitude_inflation REMOVED (prereg decision 2026-07-18): the EXP-G-002 run
# of 2026-07-18 (gate PASSED) empirically confirmed no registered metric
# consumes claim magnitude (Layer-1 scores features/directions/ranks; Layer-2
# erases by rank), so the operator could never be detected. Recorded here, in
# CHANGELOG, and in the gate run's verdict artifact. The removal does not touch
# the PASSED verdict: the operator was non-blocking, and the five detectable
# operators' calibration is unchanged. The operator's code remains in
# corruption/operators.py should a magnitude-agreement metric ever be added.
base_generator: b1_template
operators:
  - name: fabricated_feature
    ground_truth_label: corrupted
    injection_count: 1
    detector_metrics: [hfr, mention_precision]
    params:
      inject: one_feature_absent_from_topk
  - name: sign_flip
    ground_truth_label: corrupted
    injection_count: 1
    detector_metrics: [dsa_asserted]
    params:
      target: highest_magnitude_claim
  - name: rank_inversion
    ground_truth_label: corrupted
    injection_count: 1
    detector_metrics: [arc]
    params:
      target: top_two_claims
  - name: omission
    ground_truth_label: corrupted
    injection_count: 1
    detector_metrics: [mention_recall]
    params:
      target: rank_one_claim
  - name: vague_substitution
    ground_truth_label: corrupted
    injection_count: 1
    detector_metrics: [mention_recall, hfr]
    params:
      replace_with: unnamed_generic_phrase
