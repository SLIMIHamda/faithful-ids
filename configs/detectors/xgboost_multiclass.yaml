id: xgboost_multiclass
schema_version: v1
kind: detector
family: xgboost
role: anchor
attribution_ref: attribution:treeshap
# K-way detector over the canonical taxonomy in configs/taxonomy/cicids2017.yaml
# (queue #5). The binary `xgboost` config collapses every family to attack-vs-benign,
# which on CICIDS2017 is trivially separable (AUC=1.0, macro-F1=1.0) — explanations
# of a perfect toy classifier are not interpretable evidence, and probability-space
# Layer-2 saturates (comprehensiveness ~ 0.006, only margin space carried signal).
# multi:softprob restores a realistic decision surface, non-degenerate probabilities,
# and makes the per-family recall floor a real gate. num_class is set from the
# frozen class_names at train time, never hard-coded here.
hyperparameters:
  n_estimators: 400
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.9
  colsample_bytree: 0.9
  min_child_weight: 1
  objective: "multi:softprob"
  tree_method: hist
determinism:
  device: cpu
  byte_identical: true
  torch_deterministic: null
  notes: "Exact TreeSHAP over a frozen booster on CPU is byte-identical (see docs/reproducibility-guide.md)."
competence_gate:
  # Under multi:softprob the floor is per-CANONICAL-CLASS recall (classified as the
  # RIGHT family), not merely "flagged as some attack". Empty at pilot scale — add a
  # class here only with a logged rationale (ADR-0001). Infiltration/Heartbleed are
  # not listed because the taxonomy excludes them outright (too few instances).
  recall_floor_exemptions: []
