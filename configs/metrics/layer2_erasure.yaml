id: layer2_erasure
schema_version: v1
kind: metric
family: layer2
formula_version: 1.1.0  # 1.1.0: add claim-driven eps_model family (additive; eps_att unchanged)
# Two families, both measured on the frozen detector under the erasure operator:
#   eps_att   (attribution-driven, claim-free)  -> phi <-> f, generator-blind, per instance
#   eps_model (claim-driven; erases cited S)     -> claims <-> f, per explanation (ADR-0001)
# delta_space: score delta in 'prob' (default) or 'margin' (log-odds; avoids
# saturation when the detector is near-certain). The emitted run uses 'prob'
# until the saturation diagnostic is reviewed; margin requires predict_margin.
delta_space: prob
metrics:
  - name: comprehensiveness
    component: eps_att
    formula_version: 1.0.0
    notes: Drop in attack score when the top-k ATTRIBUTED features are erased.
  - name: sufficiency
    component: eps_att
    formula_version: 1.0.0
    notes: Retained attack score when only the top-k ATTRIBUTED features are kept.
  - name: comprehensiveness_cited
    component: eps_model
    formula_version: 1.0.0
    notes: Drop in attack score when the top-k CITED features (S from claims) are erased.
  - name: sufficiency_cited
    component: eps_model
    formula_version: 1.0.0
    notes: Retained attack score when only the top-k CITED features are kept.
# Erasure-efficacy invariant (CI: tests/unit/test_metrics_layer2.py): erasing ALL
# features must move the score materially; erasing NONE must move it by 0. This
# smoke test catches a no-op erasure wiring before any LLM tokens are spent.
erasure:
  primary:
    operator: conditional_expectation_imputation
    imputation_model: per_class_knn
    fitted_artifact_manifested: true
  secondary:
    operator: retrain_roar
    scope: anchor_only
  k_values: [1, 3, 5]
  # The erasure background is deliberately NOT the SHAP baseline distribution.
  background_is_shap_baseline: false
