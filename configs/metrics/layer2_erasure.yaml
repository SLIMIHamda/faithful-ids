id: layer2_erasure
schema_version: v1
kind: metric
family: layer2
formula_version: 1.0.0
metrics:
  - name: comprehensiveness
    formula_version: 1.0.0
    notes: Drop in attack score when the top-k attributed features are erased.
  - name: sufficiency
    formula_version: 1.0.0
    notes: Retained attack score when only the top-k attributed features are kept.
erasure:
  primary:
    operator: conditional_expectation_imputation
    imputation_model: per_class_knn
    fitted_artifact_manifested: true
  secondary:
    operator: retrain_roar
    scope: anchor_only
  k_values: [1, 3, 5]
  # The erasure background is deliberately NOT the SHAP baseline distribution.
  background_is_shap_baseline: false
