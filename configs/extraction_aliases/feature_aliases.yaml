# Extractor-owned paraphrase->canonical alias table (instrument asset, NOT part
# of the generation-side KB). Referenced from eval_extractor.yaml with a pinned
# sha256, so any edit here must bump the extractor instrument version.
#
# Motivation (2026-07-13, Qwen3-32B smoke): capable models paraphrase canonical
# feature names into natural language ("the maximum forward packet length" for
# "Fwd Packet Length Max"); exact vocabulary matching then finds NOTHING and
# 38/60 B3 instances scored structural zeros. Aliases are matched with the same
# longest-first masked scan as canonical names and map to the canonical name.
#
# Rules for adding aliases:
#  - multi-word, high-precision phrasings only (an unqualified "packet length"
#    or "packet size" would collide across features);
#  - matching is case-insensitive with _ and - normalised to spaces, so
#    "Init Win bytes forward" already matches the canonical name without an
#    alias entry;
#  - an alias only activates when its canonical feature is in the run's
#    feature vocabulary.
id: feature_aliases
schema_version: v1
kind: extraction_aliases
version: 1.0.0
aliases:
  Fwd Packet Length Max:
    - maximum forward packet length
    - max forward packet length
    - maximum length of the forward packets
    - maximum length of forward packets
    - largest forward packet
  Fwd Packet Length Mean:
    - average forward packet length
    - mean forward packet length
    - average length of the forward packets
    - average length of forward packets
  Fwd Packet Length Std:
    - standard deviation of forward packet length
    - forward packet length standard deviation
  Fwd Packet Length Min:
    - minimum forward packet length
    - smallest forward packet
  Bwd Packet Length Mean:
    - average backward packet length
    - mean backward packet length
    - average length of the backward packets
    - average length of backward packets
