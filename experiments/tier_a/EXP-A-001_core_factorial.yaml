id: EXP-A-001
schema_version: v1
kind: experiment
tier: tier_a
title: Tier A core factorial
research_question: >-
  H1/H2: the plausibility-faithfulness gap and its dependence on narration style
  across datasets, detectors, LLMs, and generators. Expands to
  2 x 2 x (2 + 3x3) = 44 generator-LLM cells.
hypothesis_family: [H1, H2]
design:
  mode: factorial
  axes:
    datasets: [cicids2017_corrected, unsw_nb15]
    detectors: [xgboost, ft_transformer]
    llms: [mistral_7b_instruct, llama31_8b_instruct, frontier_api]
    generators: [b0_raw_shap, b1_template, b2_zeroshot, b3_dte_style, b4_vte]
sampling_refs: [sampling:n400_stratified, sampling:stochasticity_k3]
seed_ref: seeds:tier_a
gate_dependencies: [EXP-G-001, EXP-G-002]
metric_refs: [metrics:layer1, metrics:layer2_erasure, metrics:plausibility_judge]
config_refs:
  extraction: extraction:eval_extractor
flags:
  exploratory: false
  headline_eligible: true
status: registered
