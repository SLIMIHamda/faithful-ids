<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Extractor audit v1 — blind annotation</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1a202c; --muted:#64748b;
    --line:#e2e8f0; --accent:#2563eb; --accent-soft:#dbeafe;
    --pos:#b45309; --pos-bg:#fef3c7; --neg:#0e7490; --neg-bg:#cffafe;
    --unc:#6d28d9; --unc-bg:#ede9fe; --abs:#475569; --abs-bg:#e2e8f0;
    --done:#15803d; --done-bg:#dcfce7; --hl:#fde68a;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f172a; --panel:#1e293b; --ink:#e2e8f0; --muted:#94a3b8;
      --line:#334155; --accent:#60a5fa; --accent-soft:#1e3a5f;
      --pos:#fbbf24; --pos-bg:#4a3510; --neg:#22d3ee; --neg-bg:#0e3a45;
      --unc:#c4b5fd; --unc-bg:#312e5e; --abs:#cbd5e1; --abs-bg:#33415c;
      --done:#4ade80; --done-bg:#14401f; --hl:#7a5c00;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 system-ui,"Segoe UI",Roboto,sans-serif}
  #app{max-width:1150px;margin:0 auto;padding:18px 22px 60px}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px}
  header h1{font-size:17px;margin:0;font-weight:650}
  .spacer{flex:1}
  button{font:inherit;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:8px;padding:6px 12px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin:4px 0 14px}
  .bar>div{height:100%;background:var(--accent);width:0%}
  .meta{color:var(--muted);font-size:13px}
  .cols{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;align-items:start}
  @media (max-width:900px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .expl{white-space:normal}
  .expl p{margin:0 0 10px}
  mark{background:var(--hl);color:inherit;border-radius:3px;padding:0 2px}
  .claim{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line);
    border-radius:9px;margin-bottom:8px;cursor:pointer}
  .claim.current{border-color:var(--accent);background:var(--accent-soft)}
  .claim .feat{font-weight:600;font-size:14px;flex:1;overflow-wrap:anywhere}
  .chip{font-size:12px;font-weight:700;border-radius:999px;padding:2px 9px;white-space:nowrap}
  .chip.v-plus{background:var(--pos-bg);color:var(--pos)}
  .chip.v-minus{background:var(--neg-bg);color:var(--neg)}
  .chip.v-unclear{background:var(--unc-bg);color:var(--unc)}
  .chip.v-absent{background:var(--abs-bg);color:var(--abs)}
  .chip.hedge{background:transparent;border:1px dashed var(--muted);color:var(--muted)}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .btnrow button{font-weight:650;padding:9px 14px}
  .btnrow button .kbd{opacity:.55;font-weight:400;font-size:12px;margin-left:6px}
  .btnrow button.sel-plus{background:var(--pos-bg);color:var(--pos);border-color:var(--pos)}
  .btnrow button.sel-minus{background:var(--neg-bg);color:var(--neg);border-color:var(--neg)}
  .btnrow button.sel-unclear{background:var(--unc-bg);color:var(--unc);border-color:var(--unc)}
  .btnrow button.sel-absent{background:var(--abs-bg);color:var(--abs);border-color:var(--abs)}
  .btnrow button.sel-hedge{border-color:var(--accent);color:var(--accent)}
  textarea{width:100%;font:inherit;font-size:13px;background:var(--bg);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:8px;resize:vertical;min-height:44px}
  .nav{display:flex;gap:8px;align-items:center;margin-top:14px}
  details{margin-bottom:14px;font-size:13.5px;color:var(--muted)}
  details summary{cursor:pointer;color:var(--ink);font-weight:600}
  details b{color:var(--ink)}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--bg);padding:8px 16px;border-radius:8px;
    opacity:0;transition:opacity .25s;pointer-events:none;font-size:14px;z-index:9}
  #toast.show{opacity:.95}
  .donebox{border:1px solid var(--done);background:var(--done-bg);color:var(--done);
    border-radius:10px;padding:10px 14px;margin-bottom:14px;font-weight:600}
</style>

  try{ local = JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){}

  // merge: later-saved source wins per claim
  const [base, over] = (local.saved_at||"") >= (embedded.saved_at||"") ? [embedded, local] : [local, embedded];
  const merged = JSON.parse(JSON.stringify(base));
  for(const id in over.items){
    merged.items[id] = merged.items[id] || {claims:{}, note:""};
    if(over.items[id].note) merged.items[id].note = over.items[id].note;
    Object.assign(merged.items[id].claims, over.items[id].claims);
  }
  merged.saved_at = over.saved_at || base.saved_at;
  return merged;
}
function getClaim(id, ci){ const it = state.items[id]; return it && it.claims ? it.claims[ci] : undefined; }

}

    <summary>Protocol (read once)</summary>
    <p>For each listed feature, report <b>only what the explanation text itself asserts</b> about its
    direction of influence: <b>+</b> = the text says this feature pushes the score <b>toward attack /
    raises risk</b>; <b>&minus;</b> = the text says it pushes <b>toward benign / lowers risk</b>;
    <b>unclear</b> = the feature is discussed but the text never commits to a direction;
    <b>absent</b> = the text does not actually mention this feature. Judge the prose alone — do not
    guess what the "right" answer should be. Toggle <b>hedged</b> (key H) when a direction IS
    asserted but softly/implicitly (e.g. "relatively normal, typically associated with benign
    traffic"). Progress autosaves in the browser; "Save into file" writes it into this HTML file.
    Keys: <b>1</b>/<b>+</b>, <b>2</b>/<b>&minus;</b>, <b>3</b>=unclear, <b>4</b>=absent, <b>H</b>=hedged,
    <b>&larr;&rarr;</b> claims, <b>Ctrl+&larr;&rarr;</b> items.</p>
  </details>
  <div class="cols">
    <div class="panel expl" id="expl">${renderText(it.explanation_text, it.features[cur.c])}</div>
    <div class="panel">
      <div class="meta" style="margin-bottom:8px">${esc(it.item_id)} — claims (click to select):</div>
      <div id="claims">${claimsHtml}</div>
      <div class="meta" style="margin:10px 0 4px">Current: <b>${esc(it.features[cur.c])}</b> — the text asserts:</div>
      <div class="btnrow">
        <button data-v="+" class="${curJ.v==="+"?"sel-plus":""}">+ attack<span class="kbd">1</span></button>
        <button data-v="-" class="${curJ.v==="-"?"sel-minus":""}">&minus; benign<span class="kbd">2</span></button>
        <button data-v="unclear" class="${curJ.v==="unclear"?"sel-unclear":""}">unclear<span class="kbd">3</span></button>
        <button data-v="absent" class="${curJ.v==="absent"?"sel-absent":""}">absent<span class="kbd">4</span></button>
        <button id="hedge" class="${curJ.hedged?"sel-hedge":""}">hedged<span class="kbd">H</span></button>
      </div>
      <div class="meta" style="margin:12px 0 4px">Note (optional):</div>
      <textarea id="note" placeholder="e.g. paraphrased direction, odd phrasing…">${esc(s.note||"")}</textarea>
      <div class="nav">
        <button id="prev">&larr; prev item</button>
        <button id="next">next item &rarr;</button>
        <span class="spacer"></span>
        <button id="jump">next unjudged &raquo;</button>
      </div>
    </div>
  </div>`;

  app.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>judge(b.dataset.v));
  app.querySelector("#hedge").onclick = toggleHedge;
  app.querySelectorAll(".claim").forEach(el=>el.onclick=()=>{cur.c=+el.dataset.ci; render();});
  app.querySelector("#prev").onclick = ()=>moveItem(-1);
  app.querySelector("#next").onclick = ()=>moveItem(1);
  app.querySelector("#jump").onclick = ()=>{cur = firstUnfinished(); render();};
  app.querySelector("#note").onchange = e=>{
    state.items[it.item_id] = state.items[it.item_id] || {claims:{}, note:""};
    state.items[it.item_id].note = e.target.value;
    state.saved_at = new Date().toISOString();
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  };
  app.querySelector("#save-file").onclick = saveToFile;
  app.querySelector("#export").onclick = exportJson;
}

/* ---------- actions ---------- */
function judge(v){
  const it = ITEMS[cur.i];
  setClaim(it.item_id, cur.c, {v, feature: it.features[cur.c]});
  advance();
}
function toggleHedge(){
  const it = ITEMS[cur.i];
  const j = getClaim(it.item_id, cur.c) || {};
  setClaim(it.item_id, cur.c, {hedged: !j.hedged, feature: it.features[cur.c]});
  render();
}
function advance(){
  const it = ITEMS[cur.i];
  if(cur.c < it.features.length-1){ cur.c++; }
  else if(cur.i < ITEMS.length-1){ cur.i++; cur.c=0; }
  render();
}
function moveItem(d){
  cur.i = Math.min(ITEMS.length-1, Math.max(0, cur.i+d)); cur.c = 0; render();
}

/* ---------- persistence ---------- */
function buildFileContent(){
  const clone = document.documentElement.cloneNode(true);
  clone.querySelector("#saved-annotations").textContent =
    JSON.stringify(state).replace(/<\//g,"<\\/");
  clone.querySelector("#app").innerHTML = "";
  const t = clone.querySelector("#toast"); if(t){t.className="";t.textContent="";}
  return "<!DOCTYPE html>\n" + clone.outerHTML;
}
async function saveToFile(){
  const content = buildFileContent();
  if(window.showSaveFilePicker){
    try{
      if(!fileHandle){
        fileHandle = await window.showSaveFilePicker({
          suggestedName:"annotator.html",
          types:[{description:"HTML", accept:{"text/html":[".html"]}}]});
      }
      const w = await fileHandle.createWritable();
      await w.write(content); await w.close();
      toast("Saved into file ✓"); return;
    }catch(e){
      if(e.name==="AbortError") return;
      fileHandle = null;
    }
  }
  download(content, "annotator.html", "text/html");
  toast("Browser blocked in-place save — downloaded a copy; replace the old file with it.");
}
function exportJson(){
  const rows = [];
  for(const it of ITEMS){
    const s = state.items[it.item_id]; if(!s) continue;
    it.features.forEach((f,ci)=>{
      const j = s.claims[ci];
      if(j && j.v) rows.push({item_id:it.item_id, claim_index:ci, feature:f,
        text_asserts_direction:j.v, hedged:!!j.hedged});
    });
    if(s.note) rows.push({item_id:it.item_id, note:s.note});
  }
  download(JSON.stringify({saved_at:state.saved_at, annotations:rows}, null, 1),
    "audit_annotations_v1.json", "application/json");
  toast("Exported "+rows.length+" rows");
}
function download(content, name, mime){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content], {type:mime}));
  a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}
let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "show";
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.className="", 3000);
}

/* ---------- keyboard ---------- */
document.addEventListener("keydown", e=>{
  if(e.target.tagName === "TEXTAREA") return;
  if(e.ctrlKey && e.key==="ArrowRight"){ moveItem(1); e.preventDefault(); return; }
  if(e.ctrlKey && e.key==="ArrowLeft"){ moveItem(-1); e.preventDefault(); return; }
  if(e.ctrlKey || e.altKey || e.metaKey) return;
  const k = e.key.toLowerCase();
  if(k==="1"||k==="+") judge("+");
  else if(k==="2"||k==="-") judge("-");
  else if(k==="3"||k==="u") judge("unclear");
  else if(k==="4"||k==="a") judge("absent");
  else if(k==="h") toggleHedge();
  else if(k==="arrowright"){ advance(); }
  else if(k==="arrowleft"){ if(cur.c>0){cur.c--;} else if(cur.i>0){cur.i--; cur.c=ITEMS[cur.i].features.length-1;} render(); }
  else return;
  e.preventDefault();
});

render();
</script>
</body>
</html>
